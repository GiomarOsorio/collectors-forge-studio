server {
    client_max_body_size 1024M;
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Headers de seguridad HTTP
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Content-Security-Policy: restringe orígenes de scripts, estilos e imágenes
    # connect-src incluye el backend interno y el túnel de Cloudflare
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://3d.turtlenode.dev;" always;

    # SPA: todas las rutas van a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API al backend
    location /api/ {
        proxy_pass http://calculator3d-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy archivos estáticos al backend (imágenes de impresiones, etc.) (A-03)
    location /static/ {
        proxy_pass http://calculator3d-backend:8000;
        proxy_set_header Host $host;
    }
}
