version: "3"

services:
  postgres:
    container_name: cfs-postgres
    image: docker.io/postgres:16-alpine
    volumes:
      - cfs-pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=collectorsforge
      - POSTGRES_USER=collectorsforge
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    restart: unless-stopped
    networks:
      - cfs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collectorsforge -d collectorsforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    container_name: cfs-app
    build:
      context: .
      dockerfile: Containerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://collectorsforge:${POSTGRES_PASSWORD}@postgres:5432/collectorsforge
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@cfs.local}
    ports:
      - "3000:8000"
    restart: unless-stopped
    networks:
      - cfs

  tunnel:
    container_name: cfs-tunnel
    image: docker.io/cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - cfs

networks:
  cfs:
    driver: bridge

volumes:
  cfs-pgdata:
