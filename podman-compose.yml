version: "3"

services:
  postgres:
    container_name: calculator3d-postgres
    image: docker.io/postgres:16-alpine
    volumes:
      - calculator3d-pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=turtleforge
      - POSTGRES_USER=turtleforge
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme_in_production}
    restart: unless-stopped
    networks:
      - calculator3d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turtleforge -d turtleforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: calculator3d-backend
    build:
      context: ./backend
      dockerfile: Containerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://turtleforge:${POSTGRES_PASSWORD:-changeme_in_production}@postgres:5432/turtleforge
      - SECRET_KEY=${SECRET_KEY:-cambiar-esta-clave-en-produccion-xyz789}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@calculator3d.local}
    restart: unless-stopped
    networks:
      - calculator3d

  frontend:
    container_name: calculator3d-frontend
    build:
      context: ./frontend
      dockerfile: Containerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - calculator3d

  tunnel:
    container_name: calculator3d-tunnel
    image: docker.io/cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - frontend
    restart: unless-stopped
    networks:
      - calculator3d

networks:
  calculator3d:
    driver: bridge

volumes:
  calculator3d-pgdata:
