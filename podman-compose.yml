version: "3"

services:
  postgres:
    container_name: cfs-postgres
    image: docker.io/postgres:16-alpine
    volumes:
      - cfs-pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=collectorsforge
      - POSTGRES_USER=collectorsforge
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    restart: unless-stopped
    networks:
      - cfs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collectorsforge -d collectorsforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: cfs-backend
    build:
      context: ./backend
      dockerfile: Containerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://collectorsforge:${POSTGRES_PASSWORD}@postgres:5432/collectorsforge
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@cfs.local}
      - TRACKER_URL=http://tracker:8002
    volumes:
      - slicer_jobs:/slicer_jobs
    restart: unless-stopped
    networks:
      - cfs

  tracker:
    container_name: cfs-tracker
    build:
      context: ./tracker
      dockerfile: Containerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://collectorsforge:${POSTGRES_PASSWORD}@postgres:5432/collectorsforge
      - SCAN_INTERVAL_MINUTES=${SCAN_INTERVAL_MINUTES:-300}
    restart: unless-stopped
    networks:
      - cfs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  slicer:
    container_name: cfs-slicer
    build:
      context: ./slicer
      dockerfile: Containerfile
    volumes:
      - slicer_jobs:/slicer_jobs
    networks:
      - cfs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    container_name: cfs-frontend
    build:
      context: ./frontend
      dockerfile: Containerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - cfs

  tunnel:
    container_name: cfs-tunnel
    image: docker.io/cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - frontend
    restart: unless-stopped
    networks:
      - cfs

networks:
  cfs:
    driver: bridge

volumes:
  cfs-pgdata:
  slicer_jobs:
