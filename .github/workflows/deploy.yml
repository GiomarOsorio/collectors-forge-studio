name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Lint frontend + python syntax check ──────────────────────────────────
  lint:
    name: Lint
    runs-on: self-hosted

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar deps frontend
        working-directory: frontend
        run: npm ci

      - name: ESLint frontend (no-undef es error, resto warn)
        working-directory: frontend
        run: npm run lint

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python syntax check backend
        working-directory: backend
        run: |
          python -m py_compile $(find app alembic -name "*.py")
          python -m py_compile $(find tests -name "*.py")

  # ── Tests backend con coverage + Postgres real ────────────────────────────
  test-backend:
    name: Tests Backend
    runs-on: self-hosted

    env:
      DATABASE_URL: postgresql+asyncpg://collectorsforge:ci_password@localhost:5433/collectorsforge_test
      SECRET_KEY: ci-secret-key-not-for-production
      SESSION_SECRET_KEY: ci-session-key-not-for-production

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Levantar PostgreSQL con Podman
        run: |
          podman run -d \
            --name pg-ci-${{ github.run_id }} \
            -e POSTGRES_USER=collectorsforge \
            -e POSTGRES_PASSWORD=ci_password \
            -e POSTGRES_DB=collectorsforge_test \
            -p 5433:5432 \
            docker.io/library/postgres:16
          for i in $(seq 1 30); do
            podman exec pg-ci-${{ github.run_id }} pg_isready -U collectorsforge && break
            sleep 1
          done

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Ejecutar migraciones Alembic
        working-directory: backend
        run: alembic upgrade head

      - name: Ejecutar tests con coverage
        working-directory: backend
        run: |
          pytest \
            --cov \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -v

      - name: Subir reporte de coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-backend
          path: backend/coverage.xml
          retention-days: 7

      - name: Detener PostgreSQL
        if: always()
        run: podman rm -f pg-ci-${{ github.run_id }} || true

  # ── Tests frontend (Vitest unit tests) ────────────────────────────────────
  test-frontend:
    name: Tests Frontend
    runs-on: self-hosted

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar deps frontend
        working-directory: frontend
        run: npm ci

      - name: Vitest unit tests + coverage
        working-directory: frontend
        run: npm test -- --coverage

      - name: Subir reporte de coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-frontend
          path: frontend/coverage/
          retention-days: 7

  # ── E2E + visual regression con Playwright ────────────────────────────────
  e2e-frontend:
    name: E2E + Visual Regression
    runs-on: self-hosted
    # Solo en PRs o workflow_dispatch — el deploy a main confía en lint+tests.
    # Visual regression mostraría diff en PR; en main pondría screenshots
    # nuevos como baseline (no se hace automático para evitar drift).
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar deps frontend
        working-directory: frontend
        run: npm ci

      - name: Instalar navegadores Playwright
        working-directory: frontend
        run: npx playwright install chromium

      - name: Correr E2E + visual regression
        working-directory: frontend
        env:
          CI: "true"
        run: npm run e2e

      - name: Subir reporte HTML de Playwright
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  # ── Deploy a Laptop (solo si lint + backend + frontend pasan) ────────────
  deploy:
    name: Deploy to Laptop
    runs-on: self-hosted
    needs: [lint, test-backend, test-frontend]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && needs.lint.result == 'success' && needs.test-backend.result == 'success' && needs.test-frontend.result == 'success'

    env:
      INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
      INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
      INFISICAL_PROJECT_SLUG: ${{ secrets.INFISICAL_PROJECT_SLUG || 'homelab' }}
      INFISICAL_URL: ${{ secrets.INFISICAL_URL || 'http://127.0.0.1:8080' }}
      INFISICAL_SECRET_PATH: ${{ secrets.INFISICAL_SECRET_PATH || '/collectorsforge' }}

    steps:
      - name: Pull latest changes
        run: |
          cd $HOME/collectors-forge-studio
          git pull origin main

      - name: Deploy (secretos vía Infisical)
        run: |
          cd $HOME/collectors-forge-studio
          ./deploy.sh
