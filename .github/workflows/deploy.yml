name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Coverage
    runs-on: self-hosted

    env:
      DATABASE_URL: postgresql+asyncpg://turtleforge:ci_password@localhost:5433/turtleforge_test
      SECRET_KEY: ci-secret-key-not-for-production
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: adminpassword123
      ADMIN_EMAIL: admin@ci.local

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Levantar PostgreSQL con Podman
        run: |
          podman run -d \
            --name pg-ci-${{ github.run_id }} \
            -e POSTGRES_USER=turtleforge \
            -e POSTGRES_PASSWORD=ci_password \
            -e POSTGRES_DB=turtleforge_test \
            -p 5433:5432 \
            docker.io/library/postgres:16
          for i in $(seq 1 30); do
            podman exec pg-ci-${{ github.run_id }} pg_isready -U turtleforge && break
            sleep 1
          done

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Ejecutar migraciones Alembic
        working-directory: backend
        run: alembic upgrade head

      - name: Ejecutar tests con coverage
        working-directory: backend
        run: |
          pytest \
            --cov \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -v

      - name: Subir reporte de coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 7

      - name: Detener PostgreSQL
        if: always()
        run: podman rm -f pg-ci-${{ github.run_id }} || true

  deploy:
    name: Deploy to Laptop
    runs-on: self-hosted
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.test.result == 'success'

    steps:
      - name: Pull latest changes
        run: |
          cd $HOME/Calculator3D
          git pull origin main

      - name: Escribir variables de entorno
        run: |
          {
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}"
            echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}"
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
            echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}"
            echo "ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}"
            echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}"
            echo "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}"
            echo "TUNNEL_TOKEN=${{ secrets.TUNNEL_TOKEN }}"
            echo "MINIO_ENDPOINT=${{ secrets.MINIO_ENDPOINT }}"
            echo "MINIO_ACCESS_KEY=${{ secrets.MINIO_ACCESS_KEY }}"
            echo "MINIO_SECRET_KEY=${{ secrets.MINIO_SECRET_KEY }}"
            echo "MINIO_BUCKET=${{ secrets.MINIO_BUCKET }}"
            echo "VAULT_QUOTA_GB=${{ secrets.VAULT_QUOTA_GB }}"
          } > $HOME/Calculator3DENV

      - name: Deploy
        run: |
          cd $HOME/Calculator3D
          ./deploy.sh
