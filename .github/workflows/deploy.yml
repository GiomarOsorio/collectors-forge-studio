name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: turtleforge
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: turtleforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://turtleforge:ci_password@localhost:5432/turtleforge_test
      SECRET_KEY: ci-secret-key-not-for-production
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: adminpassword123
      ADMIN_EMAIL: admin@ci.local

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Ejecutar migraciones Alembic
        working-directory: backend
        run: alembic upgrade head

      - name: Ejecutar tests con coverage
        working-directory: backend
        run: |
          pytest \
            --cov \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -v

      - name: Subir reporte de coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 7

  deploy:
    name: Deploy to Laptop
    runs-on: self-hosted
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.test.result == 'success'

    steps:
      - name: Pull latest changes
        run: |
          cd $HOME/Calculator3D
          git pull origin main

      - name: Deploy
        run: |
          cd $HOME/Calculator3D
          ./deploy.sh
