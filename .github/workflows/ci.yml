name: CI

on:
  push:
    branches: [main, develop]
    # Si TODOS los archivos cambiados son .md, GitHub omite el workflow
    # entero. PRs / pushes con mezcla md + código siguen corriendo normal.
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

# Cancela corridas en progreso de la misma rama — evita acumular runs
# duplicados si se pushea varias veces seguidas a un PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Gate — decide si este run es un push post-merge (el código ya pasó por el
  # pull_request CI completo mientras el PR estaba abierto) o un commit nuevo
  # que todavía necesita verificarse. En un push que es el merge commit de un
  # PR ya mergeado, saltamos lint/tests/e2e y corremos solo Security Audit +
  # Publish; en un push directo o un PR corremos todo. Mismo patrón que
  # bambuddy-cfs (ci.yml, job `gate`).
  #
  # Detección: en un `push`, pregunta a la API qué PRs están asociados al sha
  # empujado y si alguno fue MERGEADO como exactamente ese sha
  # (merge_commit_sha). Cierto tanto para merge commit como para squash. Otro
  # evento (pull_request/workflow_dispatch) o un fallo de API cae a `false`
  # — o sea, fail-safe hacia correr la suite completa.
  # ============================================================================

  gate:
    name: Gate (merged-PR detection)
    runs-on: ubuntu-latest
    if: github.actor == github.repository_owner
    permissions:
      contents: read
      pull-requests: read
    outputs:
      from_merged_pr: ${{ steps.detect.outputs.from_merged_pr }}
    steps:
      - name: Detectar push post-merge
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.sha }}
          EVENT: ${{ github.event_name }}
        run: |
          if [ "$EVENT" != "push" ]; then
            echo "from_merged_pr=false" >> "$GITHUB_OUTPUT"
            echo "Evento '$EVENT' no es push → CI completo."
            exit 0
          fi
          count=$(gh api "repos/$REPO/commits/$HEAD_SHA/pulls" \
            --jq "[.[] | select(.merged_at != null and .merge_commit_sha == \"$HEAD_SHA\")] | length" \
            2>/dev/null || echo 0)
          if [ "${count:-0}" -gt 0 ]; then
            echo "from_merged_pr=true" >> "$GITHUB_OUTPUT"
            echo "HEAD $HEAD_SHA es el merge commit de un PR ya mergeado → solo Security + Publish."
          else
            echo "from_merged_pr=false" >> "$GITHUB_OUTPUT"
            echo "Ningún PR mergeado mapea a $HEAD_SHA → CI completo."
          fi

  # ============================================================================
  # Security Audit (bloqueante) — corre PRIMERO, antes de lint/tests. Llama a
  # security.yml como workflow reusable para que `needs:` funcione entre
  # archivos. security.yml ya no tiene triggers propios de push/pull_request
  # (ver ese archivo) — esta es su única invocación por commit, evitando la
  # doble corrida que había antes.
  # ============================================================================

  security-audit:
    name: Security Audit
    if: github.actor == github.repository_owner
    uses: ./.github/workflows/security.yml
    permissions:
      contents: read
      security-events: write
      issues: write
    secrets: inherit

  # ── Lint frontend + python syntax check ──────────────────────────────────
  lint:
    name: Lint
    runs-on: self-hosted
    if: github.actor == github.repository_owner && needs.gate.outputs.from_merged_pr != 'true'
    needs: [gate, security-audit]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar deps frontend
        working-directory: frontend
        run: npm ci

      - name: ESLint frontend (no-undef es error, resto warn)
        working-directory: frontend
        run: npm run lint

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python syntax check backend
        working-directory: backend
        run: |
          python -m py_compile $(find app alembic -name "*.py")
          python -m py_compile $(find tests -name "*.py")

  # ── Tests backend con coverage + Postgres real ────────────────────────────
  test-backend:
    name: Tests Backend
    runs-on: self-hosted
    if: github.actor == github.repository_owner && needs.gate.outputs.from_merged_pr != 'true'
    needs: [gate, security-audit]

    env:
      DATABASE_URL: postgresql+asyncpg://collectorsforge:ci_password@localhost:5433/collectorsforge_test
      SECRET_KEY: ci-secret-key-not-for-production
      SESSION_SECRET_KEY: ci-session-key-not-for-production

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Levantar PostgreSQL con Podman
        run: |
          podman run -d \
            --name pg-ci-${{ github.run_id }} \
            -e POSTGRES_USER=collectorsforge \
            -e POSTGRES_PASSWORD=ci_password \
            -e POSTGRES_DB=collectorsforge_test \
            -p 5433:5432 \
            docker.io/library/postgres:16
          for i in $(seq 1 30); do
            podman exec pg-ci-${{ github.run_id }} pg_isready -U collectorsforge && break
            sleep 1
          done

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Ejecutar migraciones Alembic
        working-directory: backend
        run: alembic upgrade head

      - name: Ejecutar tests con coverage
        working-directory: backend
        run: |
          pytest \
            --cov \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -v

      - name: Subir reporte de coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-backend
          path: backend/coverage.xml
          retention-days: 7

      - name: Detener PostgreSQL
        if: always()
        run: podman rm -f pg-ci-${{ github.run_id }} || true

  # ── Tests frontend (Vitest unit tests) ────────────────────────────────────
  test-frontend:
    name: Tests Frontend
    runs-on: self-hosted
    if: github.actor == github.repository_owner && needs.gate.outputs.from_merged_pr != 'true'
    needs: [gate, security-audit]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar deps frontend
        working-directory: frontend
        run: npm ci

      - name: Vitest unit tests + coverage
        working-directory: frontend
        run: npm test -- --coverage

      - name: Subir reporte de coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-frontend
          path: frontend/coverage/
          retention-days: 7

  # ── E2E flows + visual regression Playwright ──────────────────────────────
  e2e-frontend:
    name: E2E + Visual
    runs-on: self-hosted
    if: (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') && needs.gate.outputs.from_merged_pr != 'true'
    needs: [gate, security-audit]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar deps frontend
        working-directory: frontend
        run: npm ci

      - name: Instalar navegadores Playwright
        working-directory: frontend
        run: npx playwright install chromium

      - name: Correr E2E + visual regression
        working-directory: frontend
        env:
          CI: "true"
        run: npm run e2e

      - name: Subir reporte HTML de Playwright
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  # ============================================================================
  # Publish (develop + main) — builda la imagen cfs-app (Containerfile en la
  # raíz, ver PR fusión backend+frontend) y la publica al registry propio.
  # Solo corre en push (nunca PR), solo si lint+tests pasaron, solo en el
  # runner self-hosted (necesita red al registry privado). Tag scheme
  # env-prefijado — el registry no tiene noción de "qué rama publicó esto"
  # una vez el tag ya está pusheado, así que el prefijo lo resuelve:
  #   develop → dev-<shortsha>,  dev-latest
  #   main    → prod-<shortsha>, prod-latest
  #
  # e2e-frontend NO está en `needs` porque solo corre en pull_request/
  # workflow_dispatch (ver su `if:` más arriba) — en un push normal a
  # develop/main ese job ni se dispara, así que no puede ser una dependencia
  # dura de un job que sí corre en push.
  #
  # !failure() && !cancelled() (en vez de dejar que `needs` lo exija
  # implícito) permite que Publish corra aun cuando gate/lint/test-backend/
  # test-frontend fueron SKIPPED (push post-merge, ver job `gate`) — un
  # `needs` en estado skipped no es success ni failure. security-audit sigue
  # siendo un gate duro: si falla, failure() es true y Publish no corre ni
  # en un push post-merge. Mismo patrón que bambuddy-cfs (ci.yml,
  # docker-publish).
  #
  # Patrón adaptado de bambuddy-cfs (mismo proyecto Infisical `homelab`,
  # mismos secrets ya usados por deploy.sh): login Infisical → jalar
  # credenciales del registry desde /Registry → build + push con podman →
  # notify best-effort a n8n (JWT RS256 firmado con openssl, no rompe el
  # publish si n8n no está configurado — la imagen ya quedó publicada).
  # ============================================================================

  docker-publish:
    name: Publish Docker Image
    runs-on: self-hosted
    if: github.actor == github.repository_owner && github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main') && !failure() && !cancelled()
    needs:
      - gate
      - security-audit
      - lint
      - test-backend
      - test-frontend
    env:
      INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
      INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
      INFISICAL_URL: ${{ secrets.INFISICAL_URL || 'http://127.0.0.1:8080' }}
      INFISICAL_PROJECT_SLUG: ${{ secrets.INFISICAL_PROJECT_SLUG || 'homelab' }}
      INFISICAL_ENV: ${{ secrets.INFISICAL_ENV || 'prod' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build y push al registry self-hosted
        run: |
          set -e
          INFISICAL_URL="${INFISICAL_URL:-http://127.0.0.1:8080}"
          INFISICAL_PROJECT="${INFISICAL_PROJECT_SLUG:-homelab}"
          INFISICAL_ENV="${INFISICAL_ENV:-prod}"

          if [ -z "$INFISICAL_CLIENT_ID" ] || [ -z "$INFISICAL_CLIENT_SECRET" ]; then
            echo "ERROR: INFISICAL_CLIENT_ID / INFISICAL_CLIENT_SECRET no configurados en los secrets del repo." >&2
            exit 1
          fi

          echo "→ Login Infisical (${INFISICAL_URL})..."
          TOKEN=$(curl -s -X POST \
              --connect-timeout 10 --max-time 30 \
              "${INFISICAL_URL}/api/v1/auth/universal-auth/login" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "clientId=${INFISICAL_CLIENT_ID}" \
              --data-urlencode "clientSecret=${INFISICAL_CLIENT_SECRET}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['accessToken'])")

          # $1 = nombre del secreto, $2 = secretPath (default /Registry)
          get_secret() {
              curl -s --get \
                  --connect-timeout 10 --max-time 30 \
                  -H "Authorization: Bearer ${TOKEN}" \
                  --data-urlencode "workspaceSlug=${INFISICAL_PROJECT}" \
                  --data-urlencode "environment=${INFISICAL_ENV}" \
                  --data-urlencode "secretPath=${2:-/Registry}" \
                  "${INFISICAL_URL}/api/v3/secrets/raw/$1" \
                  | python3 -c "import sys,json; print(json.load(sys.stdin)['secret']['secretValue'])"
          }

          echo "→ Obteniendo credenciales del registry desde Infisical..."
          REGISTRY_URL=$(get_secret REGISTRY_URL)
          REGISTRY_USER=$(get_secret REGISTRY_USER)
          REGISTRY_PASS=$(get_secret REGISTRY_PASS)
          echo "::add-mask::${REGISTRY_USER}"
          echo "::add-mask::${REGISTRY_PASS}"

          # Webhook n8n (path compartido /n8n). Best-effort: si no están, el
          # notify se salta más abajo sin romper el build. La private key PEM se enmascara.
          N8N_WEBHOOK_URL=$(get_secret N8N_WEBHOOK_URL /n8n 2>/dev/null || echo "")
          N8N_WEBHOOK_KEY=$(get_secret N8N_WEBHOOK_KEY /n8n 2>/dev/null || echo "")
          [ -n "$N8N_WEBHOOK_KEY" ] && echo "::add-mask::${N8N_WEBHOOK_KEY}"

          # REGISTRY_URL puede venir con o sin esquema — `podman login`/tags
          # de imagen quieren solo host[:puerto].
          REGISTRY_HOST="${REGISTRY_URL#https://}"
          REGISTRY_HOST="${REGISTRY_HOST#http://}"
          REGISTRY_HOST="${REGISTRY_HOST%/}"

          SHORT_SHA="${GITHUB_SHA:0:7}"
          IMAGE="${REGISTRY_HOST}/cfs-app"

          # Prefijo de ambiente según la rama que disparó el push. `main` es
          # la rama prod de este repo (no un mirror de upstream como en
          # bambuddy) — cualquier push ahí es una promoción real a prod.
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            ENV_PREFIX="prod"
          else
            ENV_PREFIX="dev"
          fi

          SHA_TAG="${ENV_PREFIX}-${SHORT_SHA}"
          LATEST_TAG="${ENV_PREFIX}-latest"

          echo "→ Login en ${REGISTRY_HOST}..."
          echo "${REGISTRY_PASS}" | podman login "${REGISTRY_HOST}" -u "${REGISTRY_USER}" --password-stdin

          echo "→ Build ${IMAGE}:${SHA_TAG} (+ ${LATEST_TAG})..."
          podman build -t "${IMAGE}:${SHA_TAG}" -t "${IMAGE}:${LATEST_TAG}" -f Containerfile .

          echo "→ Push..."
          podman push "${IMAGE}:${SHA_TAG}"
          podman push "${IMAGE}:${LATEST_TAG}"

          podman logout "${REGISTRY_HOST}"

          echo ""
          echo "=== Publicado ==="
          echo "  ${IMAGE}:${SHA_TAG}"
          echo "  ${IMAGE}:${LATEST_TAG}"

          # ── Notificar a n8n (evento: imagen construida) ─────────────────────
          # POST al webhook con servicio/env/tag en el body JSON (n8n los expone
          # en {{ $json.body }}). Firma un JWT RS256 con la clave privada PEM
          # (N8N_WEBHOOK_KEY) usando solo openssl — sin instalar pyjwt en el
          # runner. n8n valida con la public key en la credencial JWT Auth del
          # nodo Webhook. El notify es best-effort: si falla no tumba el build
          # (la imagen ya está publicada).
          if [ -n "${N8N_WEBHOOK_URL}" ] && [ -n "${N8N_WEBHOOK_KEY}" ]; then
            echo "→ Notificando a n8n..."
            b64url() { openssl base64 -A | tr '+/' '-_' | tr -d '='; }
            now=$(date +%s)
            jwt_header=$(printf '{"alg":"RS256","typ":"JWT"}' | b64url)
            jwt_payload=$(printf '{"iat":%s,"exp":%s}' "$now" "$((now + 300))" | b64url)
            jwt_signing="${jwt_header}.${jwt_payload}"
            jwt_sig=$(printf '%s' "$jwt_signing" \
              | openssl dgst -sha256 -sign <(printf '%s' "${N8N_WEBHOOK_KEY}") -binary \
              | b64url)
            JWT="${jwt_signing}.${jwt_sig}"

            # -A: User-Agent explícito no-bot. n8n con "Ignore Bots" activo
            # rechaza el User-Agent por defecto de curl (isbot lo marca) → 403.
            if curl -sf --max-time 15 -X POST "${N8N_WEBHOOK_URL}" \
                 -A "cfs-ci" \
                 -H "Authorization: Bearer ${JWT}" \
                 -H "Content-Type: application/json" \
                 -d "{\"servicio\":\"cfs-app\",\"env\":\"${ENV_PREFIX}\",\"tag\":\"${SHA_TAG}\"}"; then
              echo "  ✓ n8n notificado (servicio=cfs-app env=${ENV_PREFIX} tag=${SHA_TAG})"
            else
              echo "  ⚠ notify a n8n falló (no-fatal) — imagen ya publicada."
            fi
          else
            echo "→ N8N_WEBHOOK_URL / N8N_WEBHOOK_KEY no configurados — skip notify."
          fi
