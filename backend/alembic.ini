[alembic]
# Ruta al directorio de scripts de migración
script_location = alembic

# Agrega el directorio actual al sys.path para importar app.*
prepend_sys_path = .

# Separador de múltiples rutas de versiones
version_path_separator = os

# URL de conexión: se sobreescribe en env.py desde la variable DATABASE_URL
# Este valor es solo un placeholder; no se usa directamente en modo online.
sqlalchemy.url = postgresql+asyncpg://user:pass@localhost/turtleforge


[post_write_hooks]
# Sin hooks de post-escritura configurados


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
