[pytest]
testpaths = tests
pythonpath = .
addopts = -v --tb=short
asyncio_mode = auto

markers =
    unit: tests rápidos con MagicMock — sin BD ni red. Default.
    integration: tests con Postgres real — requiere TEST_DATABASE_URL.
    slow: tests > 1s.
    visual: snapshots o e2e que requieren navegador.
